<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism — 日曆</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="glass-theme.css">
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .calendar-day-header { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px; }
    .calendar-day {
      aspect-ratio: 1; background: rgba(255,255,255,0.3); border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border); padding: 8px; cursor: pointer;
      transition: all 0.2s; display: flex; flex-direction: column; min-height: 80px;
    }
    .calendar-day:hover { background: rgba(255,255,255,0.5); border-color: var(--glass-border-hover); }
    .calendar-day.today { background: rgba(79,106,245,0.08); border-color: rgba(79,106,245,0.2); }
    .calendar-day.today .day-number { color: var(--accent-blue); font-weight: 800; }
    .calendar-day.other-month { opacity: 0.4; }
    .day-number { font-size: 13px; font-weight: 600; }
    .day-events { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; flex: 1; }
    .day-event { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-task { background: rgba(79,106,245,0.12); color: var(--accent-blue); }
    .event-sprint { background: rgba(16,185,129,0.12); color: var(--success); }
    .event-deadline { background: rgba(239,68,68,0.12); color: var(--danger); }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .calendar-month { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">數位化專案管理</div>
      <nav>
        <div class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          專案總覽
        </div>
        <div class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          我的任務
        </div>
        <div class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          資源負載
        </div>
        <div class="nav-item active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
          日曆
        </div>
      </nav>
    </aside>

    <main class="main">
      <div class="header">
        <h1>日曆</h1>
        <div class="header-actions">
          <button class="btn btn-ghost">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="calendar-month">2026 年 6 月</div>
          <button class="btn btn-ghost">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <button class="btn btn-primary">今天</button>
        </div>
      </div>

      <div class="glass-card">
        <div class="calendar-grid">
          <div class="calendar-day-header">日</div>
          <div class="calendar-day-header">一</div>
          <div class="calendar-day-header">二</div>
          <div class="calendar-day-header">三</div>
          <div class="calendar-day-header">四</div>
          <div class="calendar-day-header">五</div>
          <div class="calendar-day-header">六</div>

          <div class="calendar-day other-month"><div class="day-number">31</div></div>
          <div class="calendar-day"><div class="day-number">1</div></div>
          <div class="calendar-day"><div class="day-number">2</div></div>
          <div class="calendar-day"><div class="day-number">3</div><div class="day-events"><div class="day-event event-task">API 串接截止</div></div></div>
          <div class="calendar-day"><div class="day-number">4</div></div>
          <div class="calendar-day"><div class="day-number">5</div></div>
          <div class="calendar-day"><div class="day-number">6</div></div>

          <div class="calendar-day"><div class="day-number">7</div></div>
          <div class="calendar-day today"><div class="day-number">8</div><div class="day-events"><div class="day-event event-deadline">UI 設計截止</div></div></div>
          <div class="calendar-day"><div class="day-number">9</div></div>
          <div class="calendar-day"><div class="day-number">10</div><div class="day-events"><div class="day-event event-task">登入 API 截止</div><div class="day-event event-sprint">Sprint 3 開始</div></div></div>
          <div class="calendar-day"><div class="day-number">11</div></div>
          <div class="calendar-day"><div class="day-number">12</div><div class="day-events"><div class="day-event event-task">商品篩選截止</div></div></div>
          <div class="calendar-day"><div class="day-number">13</div></div>

          <div class="calendar-day"><div class="day-number">14</div></div>
          <div class="calendar-day"><div class="day-number">15</div><div class="day-events"><div class="day-event event-sprint">Sprint 3 結束</div></div></div>
          <div class="calendar-day"><div class="day-number">16</div></div>
          <div class="calendar-day"><div class="day-number">17</div></div>
          <div class="calendar-day"><div class="day-number">18</div></div>
          <div class="calendar-day"><div class="day-number">19</div></div>
          <div class="calendar-day"><div class="day-number">20</div><div class="day-events"><div class="day-event event-deadline">開發階段結束</div></div></div>

          <div class="calendar-day"><div class="day-number">21</div></div>
          <div class="calendar-day"><div class="day-number">22</div></div>
          <div class="calendar-day"><div class="day-number">23</div></div>
          <div class="calendar-day"><div class="day-number">24</div></div>
          <div class="calendar-day"><div class="day-number">25</div><div class="day-events"><div class="day-event event-deadline">測試階段開始</div></div></div>
          <div class="calendar-day"><div class="day-number">26</div></div>
          <div class="calendar-day"><div class="day-number">27</div></div>

          <div class="calendar-day"><div class="day-number">28</div></div>
          <div class="calendar-day"><div class="day-number">29</div></div>
          <div class="calendar-day"><div class="day-number">30</div><div class="day-events"><div class="day-event event-deadline">專案截止</div></div></div>
          <div class="calendar-day other-month"><div class="day-number">1</div></div>
          <div class="calendar-day other-month"><div class="day-number">2</div></div>
          <div class="calendar-day other-month"><div class="day-number">3</div></div>
          <div class="calendar-day other-month"><div class="day-number">4</div></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;">
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);">
          <div style="width:10px;height:10px;border-radius:3px;background:rgba(79,106,245,0.2);"></div>
          任務截止
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);">
          <div style="width:10px;height:10px;border-radius:3px;background:rgba(16,185,129,0.2);"></div>
          Sprint
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);">
          <div style="width:10px;height:10px;border-radius:3px;background:rgba(239,68,68,0.2);"></div>
          里程碑 / 截止
        </div>
      </div>
    </main>
  </div>
</body>
</html>
